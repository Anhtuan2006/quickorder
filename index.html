<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickOrder - Đặt Đồ Ăn Nội Khu</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>🚚 QuickOrder - Campus Delivery</header>

    <div class="container">
        <!-- KHÁCH HÀNG: ĐẶT MÓN -->
        <section class="card">
            <h2>🛒 Đặt Đơn Hàng Mới</h2>
            <div class="form-group">
                <label for="select-restaurant">Chọn Quán Ăn:</label>
                <select id="select-restaurant"></select>
            </div>
            
            <label>Chọn Món Ăn:</label>
            <div id="items-container" class="grid"></div>

            <div class="form-group">
                <label for="order-location">Vị trí giao hàng (Ký túc xá / Toà nhà):</label>
                <input type="text" id="order-location" placeholder="Ví dụ: Phòng 402 - KTX B">
            </div>
            <button class="btn" id="btn-submit-order">Đặt Đơn Hàng (Form)</button>
        </section>

        <!-- KHÁCH HÀNG & TÀI XẾ: THEO DÕI ĐƠN HÀNG -->
        <section class="card">
            <h2>📋 Theo Dõi Trạng Thái Đơn Hàng <span class="polling-badge">(🔄 Tự động cập nhật 3s)</span></h2>
            <div id="tracking-container"><i>Đang tải dữ liệu đơn hàng...</i></div>
        </section>
    </div>

    <!-- Nhúng mã nguồn JS theo đúng thứ tự phụ thuộc -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
