<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickOrder - Admin Console</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="admin-header">⚙️ QuickOrder - Hệ Thống Quản Trị</header>

    <div class="container">
        <a href="index.html" class="back-link">← Quay về trang chủ Khách hàng</a>

        <!-- QUẢN LÝ QUÁN ĂN (CRUD) -->
        <section class="card">
            <h2>🏢 Quản Lý Danh Sách Quán Ăn</h2>
            <div class="form-group inline-form">
                <input type="text" id="new-res-name" placeholder="Nhập tên quán mới...">
                <button class="btn btn-sec" id="btn-add-res">Thêm Quán</button>
            </div>
            <div id="admin-res-list"></div>
        </section>

        <!-- QUẢN LÝ ĐƠN HÀNG -->
        <section class="card">
            <h2>📦 Quản Lý Trạng Thái Đơn Hàng</h2>
            <div id="admin-orders-container"><i>Đang tải danh sách đơn hàng...</i></div>
        </section>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
